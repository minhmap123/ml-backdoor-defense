name: bad_teaching
track_type: bad_teaching
seed: 42
auto_save_result: true
artifact_root: artifacts/unlearning
evaluation_batch_size: 512
allow_empty_forget_set: false
min_retained_samples: 1

forget_set:
  source: detector_flags
  topk: 0
  index_space: train_local
  score_threshold: null
  score_quantile: null
  remove_fraction: 0.0
  max_remove: 0
  larger_scores_are_more_suspicious: true

evaluation:
  train_split: false
  forget_split: true
  retain_split: false
  per_class: true

epochs: 1
batch_size: 256
learning_rate: 0.0001
weight_decay: 0.0
optimizer: adam
num_workers: 0
pin_memory: false
kl_temperature: 1.0
retain_fraction: 0.3
max_retain_samples: 0
retain_to_forget_ratio: 0.0

save_checkpoint: true
