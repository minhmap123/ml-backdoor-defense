name: abl
track_type: abl
seed: ${seed}
auto_save_result: true
artifact_root: artifacts/unlearning
evaluation_batch_size: 512
allow_empty_forget_set: true
min_retained_samples: 1

forget_set:
  source: none
  index_space: train_local

evaluation:
  train_split: false
  forget_split: false
  retain_split: false
  per_class: true

batch_size: 128
per_example_loss_batch_size: 128
optimizer: sgd
momentum: 0.9
weight_decay: 0.0001
num_workers: 0
pin_memory: false

tuning_epochs: 10
tuning_lr: 0.1
gradient_ascent_type: Flooding
gamma: 0.5
flooding: 0.5
isolation_ratio: 0.01
stage1_init: fresh_model

finetuning_ascent_model: true
stage2_init: attacked_model
finetuning_epochs: 60
finetuning_lr_init: 0.1
unlearning_epochs: 5
unlearning_lr: 0.0005

save_checkpoint: true
save_isolation_checkpoint: true
