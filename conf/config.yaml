defaults:
  - data: iotid20
  - model: mlp
  - attack: badnets
  - detection: spectral_signatures
  - unlearning: none
  - train: default
  - _self_

seed: 42
experiment_name: backdoor_unlearning_benchmark

# Staged benchmark controls. The default `full` mode preserves the original
# one-shot pipeline, while conference benchmark scripts should use
# attack_train -> detection -> unlearning with explicit artifact paths.
pipeline:
  stage: full
  run_id: null
  artifact_dir: null
  attack_train_artifact_dir: null
  detection_artifact_dir: null
  skip_existing: false

# W&B logging configuration
wandb:
  enabled: true
  project: backdoor_unlearning_benchmark
  entity: null  # Set to your W&B username or team name
  notes: null
  tags: []
  summary_profile: compact

hydra:
  run:
    dir: results/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: results/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
