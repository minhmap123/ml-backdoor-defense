name: mlbd
seed: ${seed}
auto_save_result: true
detection_artifact_root: artifacts/detection

# MLBD follows the MM-BD optimization scaffold but uses the target logit as the
# class statistic instead of the class margin.
# MM-BD paper: https://arxiv.org/abs/2205.06900
# CSO paper defining MLBD / MLBD-CSO:
# https://openreview.net/pdf/6b71568b52f136d997ef0113501c0391d73e7ad6.pdf

num_candidates: 30
num_steps: 300
lr: 0.01
sgd_momentum: 0.2
early_stop_rel_tol: 1.0e-5
significance_level: 0.05
allow_split_bounds_fallback: false

# Shared base settings
topk: 0
requires_model: true
requires_detection_split: true
requires_clean_support_split: false
