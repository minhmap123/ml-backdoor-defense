name: mm_bd
seed: ${seed}
auto_save_result: true
detection_artifact_root: artifacts/detection

# MM-BD defaults guided by the official implementation, adapted to numeric IDS.
# Paper: https://arxiv.org/abs/2205.06900
# Official repo: https://github.com/wanghangpsu/MM-BD

num_candidates: 30
num_steps: 300
lr: 0.01
sgd_momentum: 0.2
early_stop_rel_tol: 1.0e-5
significance_level: 0.05
allow_split_bounds_fallback: false

# Shared base settings
topk: 0
requires_model: true
requires_detection_split: true
requires_clean_support_split: false
